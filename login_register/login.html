<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UniBites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVIGATION BAR -->
    <nav class="navbar">
        <div class="logo">UniBites</div>
        <div class="nav-buttons">
            <button class="login">Login</button>
            <button class="signup"><a href="register.html" style="color: #fff8e7; text-decoration: none;">Sign Up</a></button>
        </div>
    </nav>

    <!-- LOGIN FORM -->
    <section class="auth-container">
        <div class="auth-form">
            <h2>Login to UniBites</h2>
            <form>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="auth-button">Login</button>
            </form>
            <p class="form-footer">Don't have an account? <a href="register.html">Sign up here</a></p>
        </div>
    </section>

    <footer class="footer">
    <div class="footer-content">
        <div class="footer-section links">
        <h4>Quick Links</h4>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        </div>
        <div class="footer-section contact">
        <h4>Contact</h4>
        <p>Email: teamemail@upnet.gr</p>
        </div>
    </div>
    <div class="footer-bottom">
        &copy; 2026 University of Patras. All rights reserved.
    </div>
    </footer>

</body>
</html>
