<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - UniBites</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <!-- NAVIGATION BAR -->
    <nav class="navbar">
        <div class="logo"><a href="../index.html">UniBites</a></div>
        <div class="nav-buttons">
            <button class="login"><a href="login.html">Login</a></button>
            <button class="signup">Sign Up</button>
        </div>
    </nav>

    <!-- REGISTER FORM -->
    <section class="auth-container">
        <div class="auth-form">
            <h2>Create Your UniBites Account</h2>
            <form>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
                <button type="submit" class="auth-button">Sign Up</button>
            </form>
            <p class="form-footer">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </section>

    <footer class="footer">
    <div class="footer-content">
        <div class="footer-section links">
        <h4>Quick Links</h4>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        </div>
        <div class="footer-section contact">
        <h4>Contact</h4>
        <p>Email: teamemail@upnet.gr</p>
        </div>
    </div>
    <div class="footer-bottom">
        &copy; 2026 University of Patras. All rights reserved.
    </div>
    </footer>

    <script src="register.js"></script>

</body>
</html>
