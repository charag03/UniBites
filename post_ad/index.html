<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <title>Unibites | Post Ad</title>
</head>
<body>

    <div class="nav">

        <div class="logo">
            <h1>UniBites</h1>
        </div>

        <div class="curr-location">
            <p>Aratou 60 ,Patras </p>
            <span><i class="fa-solid fa-sort-down"></i></span>
        </div>

        <div class="control">
            <a href="../homepage/homepage.html"><i class="fa-solid fa-house"></i></a>

            <div class="usr-menu">
                <span><i class="fa-solid fa-circle-user"></i></span>
                <div class="list">
                    <span>User</span>
                    <section class="account-section">
                        <span>Credits : 40</span>
                        <!-- reference to edit account -->
                        <a href="">Edit Account</a>
                    </section>
                    <section class="menu-section">
                        <!-- reference to deliveries -->
                        <a href="">Deliveries</a>
                        <!-- reference to meals -->
                        <a href="">Meal Posts</a>
                        <!-- reference to pending -->
                        <a href="">Pending Requests</a>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <div class="main active">
        <h1>Welcome Back, User</h1>
        <section class="description">
            <div class="container">
                <label for="description">Write your description : </label>
                <textarea class="usr-input" name="" id="description" rows="6" placeholder="Write your description"></textarea>
            </div>
        </section>

        <section class="image-inp">
            <div class="container">
                <label for="img-inp">Select image : </label>
                <input type="file" id="img-inp" accept="image/png, image/jpeg">
            </div>
        </section>

        <section class="portions">
            <div class="container">
                <label for="portion">Quantity : </label>
                <input type="number" id="portion" min="1" max="10" step="1">
            </div>
        </section>

        <section class="tags">
            <div class="container">
                <label class="toggle-label">Tags <i class="fa-solid fa-sort-down"></i></label>

                <div class="items">
                    <ul>
                        <li>
                            <label for="beef">Beef <i class="fa-solid fa-cow"></i></label>
                            <input type="checkbox" id="beef" value="Beef">
                        </li>
                        <li>
                            <label for="dairy">Dairy <i class="fa-solid fa-cheese"></i></label> 
                            <input type="checkbox" id="dairy" value="Dairy">
                        </li>

                        <li> 
                            <label for="eggs">Eggs <i class="fa-solid fa-egg"></i></label>
                            <input type="checkbox" id="eggs" value="Eggs">
                        </li>

                        <li> 
                            <label for="fish">Fish <i class="fa-solid fa-fish"></i></label>
                            <input type="checkbox" id="fish" value="Fish">
                        </li>

                        <li> 
                            <label for="rice">Rice <i class="fa-solid fa-bowl-rice"></i></label>
                            <input type="checkbox" id="rice" value="Rice">
                        </li>

                        <li> 
                            <label for="poultry">Poultry <i class="fa-solid fa-drumstick-bite"></i></label>
                            <input type="checkbox" id="poultry" value="Poultry">
                        </li>
                    </ul>
                </div>
            </div>
        </section>

        <section class="alergies">
            <div class="container">
                <label class="toggle-label">Alergies <i class="fa-solid fa-sort-down"></i></label>

                <div class="items">

                    <ul>
                        <li>
                            <label for="gluten">Gluten</label>
                            <input type="checkbox" id="gluten" value="Gluten">
                        </li>

                        <li>
                            <label for="soybeans">Soybeans </label> 
                            <input type="checkbox" id="soybean" value="Soybeans">
                        </li>

                        <li> 
                            <label for="milk">Milk</label>
                            <input type="checkbox" id="milk" value="Milk">
                        </li>

                        <li> 
                            <label for="peanuts">Peanuts </label>
                            <input type="checkbox" id="peanuts" value="Peanuts">
                        </li>

                        <li> 
                            <label for="celery">Celery </label>
                            <input type="checkbox" id="celery" value="Celery">
                        </li>
                    </ul>
                </div>
            </div>

        </section>
    </div>

    <div class="page-two">
        <h1>Welcome Back, User</h1>
        <section class="pickup-point">
            <div class="container">
                <label class="toggle-label">Pickup-Points <i class="fa-solid fa-sort-down"></i></label>
                <div class="items">
                    <ul>
                        <li>
                            <label for="address1">Agiou Nikolaou 71, Patras</label>
                            <input type="checkbox" id="address1">
                        </li>

                        <li>
                            <label for="address2">Korinthou 110, Patras </label> 
                            <input type="checkbox" id="address2" >
                        </li>
                    </ul>
                    <button class="add-address">Add a new Address</button>
                </div>
            </div>
        </section>

        <section class="timeslot">
            <div class="container">
                <label for="timeslot">Timeslot : </label>
                <input type="datetime-local">
            </div>
        </section>
    </div>

    <div class="next-page active">
            <button class="prev-btn"><i class="fa-solid fa-caret-left"></i> Prev</button>
            <button class="next-btn">Next <i class="fa-solid fa-caret-right"></i></button>
    </div>

    <div class="address-page">
        <div class="control">
            <h1>Add a New Address</h1>
            <button class="go-back"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" placeholder="Search Address">
        </div>

        <div id="map">
            
        </div>

        <div class="confirm">
            <button>Confirm</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
